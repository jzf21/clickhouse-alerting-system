<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClickHouse Alerting</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <div class="container">
      <h1>ClickHouse Alerting System</h1>
    </div>
  </header>
  <div class="container">
    <nav id="nav">
      <button class="active" data-tab="alerts">Alerts</button>
      <button data-tab="rules">Rules</button>
      <button data-tab="history">History</button>
      <button data-tab="silences">Silences</button>
      <button data-tab="channels">Channels</button>
    </nav>

    <div id="tab-alerts" class="tab-content">
      <div class="card">
        <h2>Active Alerts</h2>
        <div id="alerts-table"></div>
      </div>
    </div>

    <div id="tab-rules" class="tab-content hidden">
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
          <h2 style="margin-bottom:0">Alert Rules</h2>
          <button class="btn btn-primary" onclick="showRuleForm()">New Rule</button>
        </div>
        <div id="rules-table"></div>
      </div>
    </div>

    <div id="tab-history" class="tab-content hidden">
      <div class="card">
        <h2>Alert History</h2>
        <div id="history-table"></div>
        <div id="history-pagination" class="pagination"></div>
      </div>
    </div>

    <div id="tab-silences" class="tab-content hidden">
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
          <h2 style="margin-bottom:0">Silences</h2>
          <button class="btn btn-primary" onclick="showSilenceForm()">New Silence</button>
        </div>
        <div id="silences-table"></div>
      </div>
    </div>

    <div id="tab-channels" class="tab-content hidden">
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
          <h2 style="margin-bottom:0">Notification Channels</h2>
          <button class="btn btn-primary" onclick="showChannelForm()">New Channel</button>
        </div>
        <div id="channels-table"></div>
      </div>
    </div>

    <div id="modal-container"></div>
  </div>
  <script src="/app.js"></script>
</body>
</html>
